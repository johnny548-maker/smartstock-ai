<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a1520">
  <title>SmartStock 日報</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartStock">
  <!-- anti-FOUC: set data-theme from localStorage BEFORE css/body paint so the
       first frame already matches the saved theme (app.js's applyTheme() re-runs
       on load, but this avoids the dark->light flash). Mirrors app.js keys. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ss_theme');
        if (t !== 'dark' && t !== 'light') t = 'dark';
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = 'dark'; }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <button id="backBtn" class="hidden" aria-label="返回">&#8249;</button>
    <h1 id="title">SmartStock 日報</h1>
    <button id="themeBtn" onclick="toggleTheme()" aria-label="切換深色／淺色主題">&#9681;</button>
    <button id="refreshBtn" aria-label="重新整理">&#10227;</button>
  </header>

  <main id="app">
    <div id="status" class="status">載入中…</div>
    <section id="listView"></section>
    <section id="detailView" class="hidden"></section>
  </main>

  <footer id="foot">資料來源公開、僅供參考，不構成投資建議。</footer>

  <script src="vendor/lightweight-charts.standalone.production.js"></script>
  <script src="app.js"></script>
</body>
</html>
