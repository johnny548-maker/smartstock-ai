name: SmartStock Daily

# Runs in the cloud — your computer can stay off.
on:
  schedule:
    # 18:30 Taiwan time (UTC+8) Mon–Fri = 10:30 UTC. After TW close + 三大法人 (T86)
    # are posted, so the report carries the freshest settled data.
    - cron: '30 10 * * 1-5'
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

permissions:
  contents: write          # to commit the new report JSON back to the repo

concurrency:
  group: smartstock-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run analysis + export PWA data
        env:
          # Optional — set these as repo Secrets to also receive the report by email.
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py --web

      - name: Commit report to docs/data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "report: $(date -u +%F)" || echo "no changes to commit"
          git push
